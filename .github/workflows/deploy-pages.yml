name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
      - work
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: linha-k-showcase/package-lock.json

      - name: Install showcase dependencies
        working-directory: linha-k-showcase
        run: npm ci

      - name: Build showcase
        working-directory: linha-k-showcase
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/showcase/
        run: npm run build

      - name: Assemble Pages site
        run: |
          rm -rf _site
          mkdir -p _site/showcase
          touch _site/.nojekyll
          cp apresentacao.html _site/index.html
          cp apresentacao.html _site/apresentacao.html
          cp orcamento.html _site/orcamento.html
          cp CatalogoMasculino-2.pdf _site/CatalogoMasculino-2.pdf
          cp CatalogoFeminino-2.pdf _site/CatalogoFeminino-2.pdf
          cp -R miro _site/miro
          cp -R linha-k-showcase/dist/. _site/showcase/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
