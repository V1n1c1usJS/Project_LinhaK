<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Core Linha K — R$ 5.000 — Breakdown</title>
  <style>
    :root {
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #6b6b6b;
      --color-text-tertiary: #999;
      --color-text-info: #185FA5;
      --color-text-success: #3B6D11;
      --color-text-warning: #854F0B;
      --color-background-primary: #fff;
      --color-background-secondary: #f5f5f3;
      --color-background-tertiary: #eceae6;
      --color-background-info: #E6F1FB;
      --color-background-success: #EAF3DE;
      --color-background-warning: #FAEEDA;
      --color-border-tertiary: rgba(0, 0, 0, 0.1);
      --border-radius-lg: 12px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-text-primary: #e8e6df;
        --color-text-secondary: #9c9a92;
        --color-text-tertiary: #73726c;
        --color-text-info: #85B7EB;
        --color-text-success: #97C459;
        --color-text-warning: #FAC775;
        --color-background-primary: #1e1e1c;
        --color-background-secondary: #2a2a27;
        --color-background-tertiary: #333330;
        --color-background-info: #0C447C;
        --color-background-success: #27500A;
        --color-background-warning: #633806;
        --color-border-tertiary: rgba(255, 255, 255, 0.1);
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: var(--font-sans);
      background: var(--color-background-primary);
      color: var(--color-text-primary);
      padding: 24px;
      max-width: 720px;
      margin: 0 auto
    }

    h2 {
      font-size: 18px;
      font-weight: 500;
      color: var(--color-text-primary);
      margin-bottom: 2px
    }

    .sub {
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-bottom: 16px
    }

    .mod {
      margin-bottom: 8px;
      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      overflow: hidden
    }

    .mod-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: var(--color-background-secondary)
    }

    .mod-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-primary)
    }

    .mod-val {
      font-size: 15px;
      font-weight: 500;
      color: var(--color-text-info)
    }

    .mod-items {
      padding: 4px 14px 8px
    }

    .it {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid var(--color-border-tertiary)
    }

    .it:last-child {
      border: none
    }

    .it-name {
      font-size: 12px;
      color: var(--color-text-primary)
    }

    .it-meta {
      font-size: 11px;
      color: var(--color-text-tertiary);
      margin-top: 1px
    }

    .it-val {
      font-size: 12px;
      font-weight: 500;
      color: var(--color-text-primary);
      white-space: nowrap
    }

    .bar-wrap {
      height: 6px;
      background: var(--color-background-tertiary);
      border-radius: 3px;
      overflow: hidden
    }

    .bar-fill {
      height: 100%;
      border-radius: 3px
    }

    .total-box {
      margin-top: 16px;
      padding: 14px;
      background: var(--color-background-info);
      border-radius: var(--border-radius-lg)
    }

    .tr {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px
    }

    .tr:last-child {
      margin: 0
    }

    .tl {
      font-size: 13px;
      color: var(--color-text-info)
    }

    .tv {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-info)
    }

    .tv-big {
      font-size: 20px
    }

    .divider {
      height: 1px;
      background: var(--color-border-tertiary);
      margin: 8px 0;
      opacity: .5
    }

    .note {
      font-size: 11px;
      color: var(--color-text-tertiary);
      margin-top: 10px;
      line-height: 1.6
    }
  </style>
</head>

<body>
  <h2>Core Linha K — R$ 5.000</h2>
  <div class="sub">MVP funcional: loja completa + checkout + pagamento + frete + admin básico</div>
  <div id="mods"></div>
  <div class="total-box" id="totals"></div>
  <p class="note">* Valores distribuídos por módulo conforme escopo final acordado. Manutenção mensal não inclusa.</p>

  <h2 style="margin-top:24px">Módulos Opcionais</h2>
  <div class="sub">Expansões disponíveis após a entrega do core</div>
  <div id="opts"></div>

  <script>
    const T = 5000;
    const mods = [
      {
        name: "Módulo 1 — Vitrine e Gestão", val: 2100, color: "#378ADD", items: [
          { name: "Página Inicial (Home) — visual premium, 100% mobile", val: 600 },
          { name: "Catálogo de Perfumes — fotos e notas olfativas", val: 500 },
          { name: "Painel Administrativo — cadastro de produtos e pedidos", val: 1000 },
        ]
      },
      {
        name: "Módulo 2 — Motor de Vendas", val: 2900, color: "#1D9E75", items: [
          { name: "Carrinho e Checkout — revisão, entrega e pagamento", val: 1200 },
          { name: "Integração de Pagamento — Pix/Cartão com antifraude", val: 600 },
          { name: "Integração de Frete — cálculo automático via SuperFrete", val: 600 },
          { name: "Automação de E-mails — confirmações e rastreio para o cliente", val: 250 },
          { name: "Automação de NF-e — geração automática da nota fiscal", val: 250 },
        ]
      },
    ];
    const opts = [
      { name: "Cadastro de Cliente", desc: "Conta do cliente com histórico de pedidos e endereços salvos.", val: 500 },
      { name: "Recomendação Automática", desc: "Sugestão de perfumes relacionados na página do produto e no carrinho.", val: 1000 },
      { name: "Dashboard de Administração", desc: "Painel gerencial com KPIs: faturamento, pedidos por status e produtos mais vendidos.", val: 800 },
    ];
    const fmt = v => 'R$ ' + v.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    let html = '';
    mods.forEach(m => {
      const barWidth = Math.round(m.val / T * 100);
      let ih = '';
      m.items.forEach(it => {
        ih += `<div class="it"><div><div class="it-name">${it.name}</div></div><div class="it-val">${fmt(it.val)}</div></div>`;
      });
      html += `<div class="mod"><div class="mod-head"><span class="mod-name">${m.name}</span><span class="mod-val">${fmt(m.val)}</span></div><div class="bar-wrap"><div class="bar-fill" style="width:${barWidth}%;background:${m.color}"></div></div><div class="mod-items">${ih}</div></div>`;
    });
    document.getElementById('mods').innerHTML = html;
    document.getElementById('totals').innerHTML = `
<div class="tr"><span class="tl">Módulo 1 — Vitrine e Gestão</span><span class="tv">${fmt(2100)} <span style="font-weight:400;font-size:11px">· 42%</span></span></div>
<div class="tr"><span class="tl">Módulo 2 — Motor de Vendas</span><span class="tv">${fmt(2900)} <span style="font-weight:400;font-size:11px">· 58%</span></span></div>
<div class="divider"></div>
<div class="tr"><span class="tl" style="font-weight:500">Total core</span><span class="tv tv-big">${fmt(T)}</span></div>
<div class="divider"></div>
<div class="tr"><span class="tl">Prazo estimado</span><span class="tv">3 meses</span></div>
`;
    let oh = '';
    opts.forEach(o => {
      oh += `<div class="mod"><div class="mod-head"><span class="mod-name">${o.name}</span><span class="mod-val">${fmt(o.val)}</span></div><div class="mod-items"><div class="it"><div class="it-name" style="color:var(--color-text-secondary)">${o.desc}</div></div></div></div>`;
    });
    document.getElementById('opts').innerHTML = oh;
  </script>
</body>

</html>
